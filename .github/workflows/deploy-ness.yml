name: Stage deploy

#on:
#  pull_request:
#    branches: [ stage ]
#    types: [ closed ]  # PR 머지 완료 시
#  workflow_dispatch:

on:
  push:
    branches: [ stage-js ]    # push시

jobs:
  deploy-stage:
    runs-on: ubuntu-latest
    environment: stage

    steps:
      - name: Add SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ci
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ci
          ssh-keyscan -H ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on stage server
        run: |
          ssh -i ~/.ssh/id_ci ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} 'bash -s' <<'SSH'
          set -e
          cd ${{ secrets.REMOTE_TARGET }}  
          git fetch origin
          git checkout stage
          git reset --hard origin/stage

          pnpm i --frozen-lockfile

          for d in ./web/*; do
            [ -f "$d/package.json" ] || continue
            echo "[stage] building $d"
            pnpm -F "$d" run build
          done

          pm2 startOrReload ecosystem.config.js --env stage
          pm2 save
          SSH
