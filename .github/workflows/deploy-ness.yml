name: Deploy ness (main)

on:
  push:
    branches: [ prod ]    # PR 머지 시 동작

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install deps (root)
        run: pnpm install --frozen-lockfile

      - name: Build web/ness
        run: pnpm -F ./web/ness build

      # 런타임 전용 포장물(out/)
      - name: Prepare runtime artifact
        run: |
          mkdir -p out
          cp -r ./web/ness/build out/build

          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const base = path.resolve('web/ness'); 

          const need = [
            'react','react-dom','react-router','@react-router/node','@react-router/serve',
            'isbot','i18next','react-i18next','i18next-resources-to-backend',
            'date-fns','ky','@tanstack/react-table','mediainfo.js','react-dropzone',
            'lucide-react','js-cookie','tailwind-merge'
          ];

          const deps = {};
          for (const name of need) {
            try {
              const p = require.resolve(`${name}/package.json`, { paths: [base] });
              deps[name] = require(p).version;
            } catch (e) {
            }
          }

          const pkg = {
            name: 'ness-runtime',
            private: true,
            type: 'module',
            version: '0.0.0',
            scripts: { start: 'react-router-serve ./build/server/index.js' },
            dependencies: deps
          };
          fs.writeFileSync('out/package.json', JSON.stringify(pkg, null, 2));
          console.log('Runtime deps:', pkg.dependencies);
          NODE

      - name: Add SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ci
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ci
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Upload to server
        run: |
          rsync -az --delete -e "ssh -i ~/.ssh/id_ci" out/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/nesspjs/upload/

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/id_ci ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "bash /var/www/nesspjs/deploy.sh"
