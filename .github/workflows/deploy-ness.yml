- name: Deploy on stage server
  env:
    SSH_HOST: ${{ secrets.REMOTE_HOST }}
    SSH_USER: ${{ secrets.REMOTE_USER }}
    REMOTE_TARGET: ${{ secrets.REMOTE_TARGET }}
  run: |
    set -euo pipefail
    ssh -i ~/.ssh/id_ci "$SSH_USER"@"$SSH_HOST" "REMOTE_TARGET='$REMOTE_TARGET' bash -s" <<'SSH'
    set -e

    cd "$REMOTE_TARGET"

    # 0) Node 버전 점검(react-router v7은 Node >= 20 필요)
    if ! node -v | grep -qE '^v2[0-9]\.'; then
      echo "[setup] Node 20+ not found, installing..."
      curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
      sudo apt-get install -y nodejs
    fi

    # 1) pnpm 보장
    if ! command -v pnpm >/dev/null 2>&1; then
      echo "[setup] enabling pnpm via corepack..."
      if command -v corepack >/dev/null 2>&1; then
        corepack enable
        corepack prepare pnpm@9 --activate
      else
        echo "[setup] corepack not available, fallback to npm -g"
        npm i -g pnpm@9 || (npm config set prefix "$HOME/.npm-global" && npm i -g pnpm@9 && export PATH="$HOME/.npm-global/bin:$PATH")
      fi
    fi
    pnpm -v

    # 2) 코드 동기화
    git fetch origin
    git checkout stage
    git reset --hard origin/stage

    # 3) 의존성 설치 + 빌드
    pnpm i --frozen-lockfile

    for d in ./web/*; do
      [ -f "$d/package.json" ] || continue
      echo "[stage] building $d"
      pnpm -F "$d" run build
    done

    # 4) PM2 재가동 (파일 확장자 맞춰주세요: .cjs 쓰면 아래도 .cjs)
    pm2 startOrReload ecosystem.config.cjs --env stage --update-env || pm2 startOrReload ecosystem.config.js --env stage --update-env
    pm2 save
    SSH
