name: Stage deploy

#on:
#  pull_request:
#    branches: [ stage ]
#    types: [ closed ]  # PR 머지 완료 시
#  workflow_dispatch:

on:
  push:
    branches: [ stage-js ]    # push시

jobs:
  deploy-stage:
    runs-on: ubuntu-latest
    environment: stage

    steps:
      - name: Add SSH key
        run: |
          install -m 600 -D /dev/null ~/.ssh/id_ci
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ci
          ssh-keyscan -H ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy on stage server
        run: |
          ssh -i ~/.ssh/id_ci ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} 'bash -se' <<'SSH'
          set -euo pipefail

          cd ${{ secrets.REMOTE_TARGET }}

          # Node 20+ 보장 (없으면 설치)
          if ! command -v node >/dev/null 2>&1 || ! node -v | grep -qE '^v2[0-9]\.'; then
            echo "[setup] Installing Node.js 20..."
            curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
            sudo apt-get install -y nodejs
          fi

          # ---- pnpm 보장: corepack enable 쓰지 말고 홈 디렉토리에 설치 ----
          export PNPM_HOME="$HOME/.local/share/pnpm"
          export PATH="$PNPM_HOME:$PATH"
          if ! command -v pnpm >/dev/null 2>&1; then
            echo "[setup] Installing pnpm (user scope)..."
            curl -fsSL https://get.pnpm.io/install.sh | sh -
            # 설치 직후 셸에 즉시 적용
            export PNPM_HOME="$HOME/.local/share/pnpm"
            export PATH="$PNPM_HOME:$PATH"
          fi
          pnpm -v

          # 의존성 설치 + /web/* 빌드
          git fetch origin
          git checkout stage
          git reset --hard origin/stage

          pnpm install --frozen-lockfile
          for d in ./web/*; do
            [ -f "$d/package.json" ] || continue
            echo "[stage] building $d"
            pnpm -F "$d" run build
          done

          # PM2 재가동 (확장자에 맞춰 선택)
          CFG=ecosystem.config.cjs; [ -f "$CFG" ] || CFG=ecosystem.config.js
          pm2 startOrReload "$CFG" --env stage --update-env
          pm2 save
          SSH