name: Stage deploy

#on:
#  pull_request:
#    branches: [ stage ]
#    types: [ closed ]  # PR 머지 완료 시
#  workflow_dispatch:

on:
  push:
    branches: [ stage-js ]

jobs:
  deploy-stage:
    runs-on: ubuntu-latest
    environment: stage

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          ssh-keyscan -H ${{ secrets.REMOTE_HOST }} >> ~/.ssh/known_hosts

      - name: Execute Script 1
        run: |
          ssh ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} "
            echo '=== Executing Script 1 ==='
            cd ${{ secrets.REMOTE_TARGET }}
            chmod +x script1.sh
            ./script1.sh
            echo 'Script 1 completed successfully'
          "

      - name: Execute Script 2
        run: |
          ssh ${{ secrets.REMOTE_USER }}@${{ secrets.REMOTE_HOST }} "
            echo '=== Executing Script 2 ==='
            cd ${{ secrets.REMOTE_TARGET }}
            chmod +x script2.sh
            ./script2.sh
            echo 'Script 2 completed successfully'
          "

      - name: Deployment completed
        run: echo "All scripts executed successfully!"